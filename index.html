<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cloth-ai</title>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var div = document.createElement("div");
        div.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,0,0,0.9);color:white;padding:20px;z-index:9999;font-family:monospace;white-space:pre-wrap;";
        div.innerHTML = "<h1>Critical Error Encountered</h1>" +
                        "<b>Message:</b> " + msg + "\n" +
                        "<b>Source:</b> " + url + ":" + lineNo + ":" + columnNo + "\n" +
                        "<b>Stack:</b> " + (error ? error.stack : "N/A");
        document.body.appendChild(div);
        return false;
      };
      window.onunhandledrejection = function(event) {
        var div = document.createElement("div");
        div.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,100,0,0.9);color:white;padding:20px;z-index:9999;font-family:monospace;white-space:pre-wrap;";
        div.innerHTML = "<h1>Unhandled Promise Rejection</h1>" +
                        "<b>Reason:</b> " + event.reason + "\n" +
                        "<b>Stack:</b> " + (event.reason ? event.reason.stack : "N/A");
        document.body.appendChild(div);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
